<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>K-Nexus | Kolhan University PYQ Hub</title>
                <script src="https://cdn.tailwindcss.com"></script>
                    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
                        <style>
                                body { font-family: 'Inter', sans-serif; }
                                        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
                                                .dark .glass { background: rgba(15, 23, 42, 0.9); }
                                                    </style>
                                                    </head>
                                                    <body class="bg-[#F8FAFC] text-slate-900 transition-colors duration-300 dark:bg-slate-900 dark:text-white">

                                                        <nav class="fixed top-0 w-full z-50 glass border-b border-slate-200 dark:border-slate-700">
                                                                <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                                                                            <h1 class="text-2xl font-bold text-[#4F46E5]">K-Nexus</h1>
                                                                                        <button id="darkToggle" class="p-2 rounded-full bg-slate-200 dark:bg-slate-800">🌙</button>
                                                                                                </div>
                                                                                                    </nav>

                                                                                                        <section id="home" class="pt-32 pb-20 px-4 bg-gradient-to-br from-indigo-50 to-emerald-50 dark:from-slate-800 dark:to-slate-900">
                                                                                                                <div class="max-w-4xl mx-auto text-center">
                                                                                                                            <h2 class="text-4xl md:text-6xl font-extrabold mt-6">K-Nexus Hub</h2>
                                                                                                                                        <div class="mt-10 relative max-w-2xl mx-auto px-4">
                                                                                                                                                        <input type="text" id="searchInput" placeholder="Search Subject, Sem, or Year..." 
                                                                                                                                                                               class="w-full p-4 rounded-2xl border border-slate-200 shadow-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:bg-slate-800 dark:border-slate-700 dark:text-white transition-all">
                                                                                                                                                                                           </div>
                                                                                                                                                                                                   </div>
                                                                                                                                                                                                       </section>

                                                                                                                                                                                                           <section id="subjects" class="max-w-7xl mx-auto py-10 px-4">
                                                                                                                                                                                                                   <div id="gridContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
                                                                                                                                                                                                                       </section>

                                                                                                                                                                                                                           <section id="upload" class="bg-white dark:bg-slate-800 py-20">
                                                                                                                                                                                                                                   <div class="max-w-3xl mx-auto px-4">
                                                                                                                                                                                                                                               <form name="pyq-upload" method="POST" data-netlify="true" action="/tum-to-accha-admi-hee" enctype="multipart/form-data" class="space-y-4">
                                                                                                                                                                                                                                                               <input type="hidden" name="form-name" value="pyq-upload" />
                                                                                                                                                                                                                                                                               <h3 class="text-2xl font-bold mb-4">Contribute a Paper</h3>
                                                                                                                                                                                                                                                                                               <input type="text" name="name" placeholder="Your Name" required class="w-full p-3 rounded-lg border dark:bg-slate-900">
                                                                                                                                                                                                                                                                                                               <input type="file" name="file" required class="w-full">
                                                                                                                                                                                                                                                                                                                               <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg">Upload Now</button>
                                                                                                                                                                                                                                                                                                                                           </form>
                                                                                                                                                                                                                                                                                                                                                   </div>
                                                                                                                                                                                                                                                                                                                                                       </section>

                                                                                                                                                                                                                                                                                                                                                           <script src="script.js"></script>
                                                                                                                                                                                                                                                                                                                                                           </body>
                                                                                                                                                                                                                                                                                                                                                           </html>
