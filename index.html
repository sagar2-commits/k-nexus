<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>K-Nexus | Kolhan University PYQ Hub</title>
                <meta name="description" content="Download Kolhan University Previous Year Questions for MJ, MN, MDC, and SEC courses.">
                    <script src="https://cdn.tailwindcss.com"></script>
                        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
                            <style>
                                    body { font-family: 'Inter', sans-serif; }
                                            .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
                                                    .dark .glass { background: rgba(15, 23, 42, 0.9); }
                                                        </style>
                                                        </head>
                                                        <body class="bg-[#F8FAFC] text-slate-900 transition-colors duration-300 dark:bg-slate-900 dark:text-white">

                                                            <nav class="fixed top-0 w-full z-50 glass border-b border-slate-200 dark:border-slate-700">
                                                                    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                                                                                <h1 class="text-2xl font-bold text-[#4F46E5]">K-Nexus</h1>
                                                                                            <div class="hidden md:flex space-x-8 font-medium">
                                                                                                            <a href="#home" class="hover:text-[#4F46E5]">Home</a>
                                                                                                                            <a href="#subjects" class="hover:text-[#4F46E5]">Subjects</a>
                                                                                                                                            <a href="#upload" class="hover:text-[#4F46E5]">Contribute</a>
                                                                                                                                                        </div>
                                                                                                                                                                    <button id="darkToggle" class="p-2 rounded-full bg-slate-200 dark:bg-slate-800">🌙</button>
                                                                                                                                                                            </div>
                                                                                                                                                                                </nav>

                                                                                                                                                                                    <section id="home" class="pt-32 pb-20 px-4 bg-gradient-to-br from-indigo-50 to-emerald-50 dark:from-slate-800 dark:to-slate-900">
                                                                                                                                                                                            <div class="max-w-4xl mx-auto text-center">
                                                                                                                                                                                                        <span class="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-sm font-semibold">Kolhan University Portal</span>
                                                                                                                                                                                                                    <h2 class="text-4xl md:text-6xl font-extrabold mt-6 leading-tight">Your Academic Success starts with <span class="text-[#4F46E5]">Better Preparation.</span></h2>
                                                                                                                                                                                                                                <p class="mt-4 text-slate-600 dark:text-slate-400 text-lg">Instant access to MJ, MN, MDC, and SEC Previous Year Papers.</p>
                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                        <div class="mt-10 relative max-w-2xl mx-auto">
                                                                                                                                                                                                                                                                        <input type="text" id="searchInput" placeholder="Search Subject (e.g. Physics, History)..." class="w-full p-4 pl-12 rounded-2xl border border-slate-200 shadow-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:bg-slate-800">
                                                                                                                                                                                                                                                                                        <span class="absolute left-4 top-4">🔍</span>
                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                </section>

                                                                                                                                                                                                                                                                                                                    <section id="subjects" class="max-w-7xl mx-auto py-20 px-4">
                                                                                                                                                                                                                                                                                                                            <h3 class="text-3xl font-bold mb-10 border-l-4 border-emerald-500 pl-4">Browse by Department</h3>
                                                                                                                                                                                                                                                                                                                                    <div id="gridContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                    </section>

                                                                                                                                                                                                                                                                                                                                                        <section id="upload" class="bg-white dark:bg-slate-800 py-20">
                                                                                                                                                                                                                                                                                                                                                                <div class="max-w-3xl mx-auto px-4">
                                                                                                                                                                                                                                                                                                                                                                            <div class="bg-slate-50 dark:bg-slate-700 p-8 rounded-3xl border border-dashed border-indigo-300">
                                                                                                                                                                                                                                                                                                                                                                                            <h3 class="text-2xl font-bold mb-2">Help your Juniors 📚</h3>
                                                                                                                                                                                                                                                                                                                                                                                                            <p class="mb-6 text-slate-500">Upload a paper and we'll add it to the database.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                            <form name="pyq-upload" method="POST" data-netlify="true" action="/thank-you.html" enctype="multipart/form-data" class="space-y-4">
                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="text" name="name" placeholder="Full Name" required class="p-3 rounded-lg dark:bg-slate-900 border border-slate-200 dark:border-slate-600">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <input type="email" name="email" placeholder="Email Address" required class="p-3 rounded-lg dark:bg-slate-900 border border-slate-200 dark:border-slate-600">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <select name="category" class="w-full p-3 rounded-lg dark:bg-slate-900 border border-slate-200 dark:border-slate-600">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <option>Major (MJ)</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option>Minor (MN)</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <option>SEC / MDC / VAC</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="file" name="file" required class="w-full">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button type="submit" class="w-full bg-[#4F46E5] text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition">Submit Paper for Review</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </form>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </section>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <script src="script.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
