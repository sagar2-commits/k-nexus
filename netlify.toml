# ============================================================================
# OPTIONAL: NETLIFY FORMS (Free tier included!)
# ============================================================================

# Your HTML form will be auto-detected by Netlify if it has:
# 1. method="POST"
# 2. name="form-name" attribute (hidden input with form name)
# 3. netlify attribute OR data-netlify="true"

# Example form in HTML:
# <form name="pyq-upload" method="POST" netlify>
#   <input type="text" name="name" required>
#   <input type="email" name="email">
#   <input type="file" name="paper">
#   <button type="submit">Submit</button>
# </form>

# After first deployment, form submissions appear in:
# Netlify Dashboard → Forms → Submissions

# ============================================================================
# DEPLOYMENT INSTRUCTIONS
# ============================================================================

# 1. Save this file as "netlify.toml" in your project root
# 2. Commit and push: git push origin main
# 3. Netlify auto-detects netlify.toml and uses it
# 4. Check deploy: https://app.netlify.com/sites/YOUR_SITE/deploys
# 5. Verify security headers: https://securityheaders.com (paste your domain)
# 6. Done! ✅

# ============================================================================
# FILE STRUCTURE EXPECTED
# ============================================================================

# Your project should look like:
# project-root/
# ├── netlify.toml (THIS FILE)
# ├── package.json (if using npm)
# ├── index.html (your main app)
# ├── thank-you.html (form success page)
# ├── manifest.json (PWA manifest)
# ├── sw.js (service worker)
# ├── style.css (your styles)
# ├── app.js (your app logic)
# ├── images/ (your images)
# ├── fonts/ (your fonts)
# └── papers/ (PDF papers)

# ============================================================================
# TESTING YOUR CONFIGURATION
# ============================================================================

# Test redirects:
# curl -I https://yourdomain.com/tum-to-accha-admi-hee
# (should redirect to /thank-you.html)

# Test security headers:
# curl -I https://yourdomain.com
# (look for: X-Content-Type-Options, X-Frame-Options, etc.)

# Test caching:
# curl -I https://yourdomain.com/app.js
# (should show: Cache-Control: public, max-age=31536000)

# ============================================================================
# COMMON ISSUES & SOLUTIONS
# ============================================================================

# ISSUE: "Form submissions not appearing"
# SOLUTION:
# 1. Check form has: name="form-name" attribute
# 2. Check form has: method="POST"
# 3. Check form has: netlify or data-netlify="true"
# 4. Redeploy after adding netlify attribute
# 5. Go to: Netlify Dashboard → Forms → (your form name)

# ISSUE: "Security headers not showing"
# SOLUTION:
# 1. Check [[headers]] sections are present (they are)
# 2. Clear browser cache: Ctrl+Shift+Del
# 3. Try incognito window
# 4. Check deploy log: no errors?
# 5. Verify on: https://securityheaders.com

# ISSUE: "404 on /thank-you.html"
# SOLUTION:
# 1. Make sure thank-you.html exists in root
# 2. Check filename spelling (case-sensitive)
# 3. Test redirect: curl -I https://yourdomain.com/tum-to-accha-admi-hee
# 4. Check deploy log for errors

# ISSUE: "Client-side routing not working"
# SOLUTION:
# 1. Last redirect rule must be: from = "/*" to = "/index.html"
# 2. Make sure it's AFTER all other rules
# 3. Don't remove or modify the fallback rule
# 4. This allows React/Vue/etc to handle routing

