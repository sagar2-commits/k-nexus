# K-Nexus v2.0 - Netlify FREE Tier Configuration
# Optimized for Netlify Free Plan - No paid features required
# Just copy this file as "netlify.toml" in your project root

[build]
  publish = "/"
  # Free tier has 300 build minutes per month (enough)
  # If you have build command, add it here:
  # command = "npm run build"

# ============================================================================
# DEVELOPMENT CONTEXT
# ============================================================================

[context.develop]
  # Local development
  command = "npm run dev"

# ============================================================================
# REDIRECTS & URL HANDLING (Free tier: unlimited)
# ============================================================================

# Form submission success redirect (your existing rule)
[[redirects]]
  from = "/tum-to-accha-admi-hee"
  to = "/thank-you.html"
  status = 200
  force = true

# Alternative form success paths (for future A/B testing)
[[redirects]]
  from = "/form-success"
  to = "/thank-you.html"
  status = 200

[[redirects]]
  from = "/submission-complete"
  to = "/thank-you.html"
  status = 200

# User dashboard redirect
[[redirects]]
  from = "/dashboard"
  to = "/index.html"
  status = 200

# Papers/search routes
[[redirects]]
  from = "/papers/*"
  to = "/index.html"
  status = 200

# Analytics redirect (placeholder for future)
[[redirects]]
  from = "/analytics"
  to = "/index.html"
  status = 200

# Sitemap and robots (for SEO)
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# Service worker (must be served correctly)
[[redirects]]
  from = "/sw.js"
  to = "/sw.js"
  status = 200

# Manifest for PWA
[[redirects]]
  from = "/manifest.json"
  to = "/manifest.json"
  status = 200

# IMPORTANT: Fallback route - MUST BE LAST!
# This enables client-side routing for single-page apps
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# ============================================================================
# HTTP HEADERS - SECURITY & PERFORMANCE (Free tier: full support)
# ============================================================================

# SECURITY HEADERS FOR ALL FILES
[[headers]]
  for = "/*"
  
  [headers.values]
    # Prevent MIME-type sniffing (important!)
    X-Content-Type-Options = "nosniff"
    
    # Prevent clickjacking
    X-Frame-Options = "SAMEORIGIN"
    
    # Enable browser XSS protection
    X-XSS-Protection = "1; mode=block"
    
    # Control referrer information (privacy)
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Deny access to sensitive APIs
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    
    # Compression
    Vary = "Accept-Encoding"

# HTML FILES - NEVER CACHE (always fresh)
[[headers]]
  for = "/*.html"
  
  [headers.values]
    # Don't cache HTML - users always get latest
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "text/html; charset=utf-8"

# JAVASCRIPT FILES - CACHE LONG TERM
# (Works best with versioning: app.v1.js, app.v2.js, etc.)
[[headers]]
  for = "/*.js"
  
  [headers.values]
    # Cache for 1 year - assumes you version your files
    Cache-Control = "public, max-age=31536000"
    Content-Type = "application/javascript"

# CSS FILES - CACHE LONG TERM
[[headers]]
  for = "/*.css"
  
  [headers.values]
    # Cache for 1 year
    Cache-Control = "public, max-age=31536000"
    Content-Type = "text/css"

# IMAGE FILES - CACHE LONG TERM
[[headers]]
  for = "/images/*"
  
  [headers.values]
    # Cache for 1 year
    Cache-Control = "public, max-age=31536000"

# FONT FILES - CACHE VERY LONG TERM
[[headers]]
  for = "/fonts/*"
  
  [headers.values]
    # Cache for 1 year
    Cache-Control = "public, max-age=31536000"

# PDF PAPERS - CACHE FOR 7 DAYS
[[headers]]
  for = "/papers/*.pdf"
  
  [headers.values]
    # Papers don't change often, cache for 7 days
    Cache-Control = "public, max-age=604800"
    Content-Type = "application/pdf"

# SERVICE WORKER - ALWAYS CHECK FOR UPDATES
[[headers]]
  for = "/sw.js"
  
  [headers.values]
    # Service worker must be checked every time
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/javascript"
    Service-Worker-Allowed = "/"

# MANIFEST - CHECK HOURLY
[[headers]]
  for = "/manifest.json"
  
  [headers.values]
    # PWA manifest - check hourly for updates
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/manifest+json"

